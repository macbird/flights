# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flights-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python flight_server.py
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: SERPAPI_KEY
        sync: false
      - key: MCP_AUTH_MODE
        value: oauth2
      - key: MCP_OAUTH2_JWKS_URL
        value: https://keycloak-dev-admin.eva.bot/auth/realms/eva.bot/protocol/openid-connect/certs
      - key: MCP_OAUTH2_ISSUER
        value: https://keycloak-dev-admin.eva.bot/auth/realms/eva.bot
      - key: MCP_OAUTH2_AUDIENCE
        value: account
